<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">Procurement Request Workflow</text>

  <!-- Legend -->
  <g transform="translate(580, 50)">
    <rect x="0" y="0" width="220" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="10" y="20" font-size="11" font-weight="600" fill="#475569">Legend</text>
    <circle cx="20" cy="38" r="5" fill="#16a34a"/><text x="32" y="42" font-size="11" fill="#475569">Approve</text>
    <circle cx="120" cy="38" r="5" fill="#dc2626"/><text x="132" y="42" font-size="11" fill="#475569">Reject</text>
    <circle cx="20" cy="58" r="5" fill="#2563eb"/><text x="32" y="62" font-size="11" fill="#475569">Revise &amp; Resubmit</text>
    <circle cx="20" cy="78" r="5" fill="#64748b"/><text x="32" y="82" font-size="11" fill="#475569">Action</text>
  </g>

  <!-- Role swim lane labels -->
  <text x="30" y="115" font-size="11" font-weight="600" fill="#94a3b8" transform="rotate(-90, 30, 115)">REQUESTER</text>
  <text x="30" y="290" font-size="11" font-weight="600" fill="#94a3b8" transform="rotate(-90, 30, 290)">MANAGER</text>
  <text x="30" y="430" font-size="11" font-weight="600" fill="#94a3b8" transform="rotate(-90, 30, 430)">FINANCE</text>

  <!-- Swim lane dividers -->
  <line x1="50" y1="180" x2="780" y2="180" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="50" y1="350" x2="780" y2="350" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Draft -->
  <rect x="80" y="80" width="130" height="44" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="145" y="106" text-anchor="middle" font-weight="600" fill="#475569">Draft</text>

  <!-- Arrow: Draft → Submitted -->
  <line x1="210" y1="102" x2="270" y2="102" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="240" y="95" text-anchor="middle" font-size="10" fill="#64748b">submit</text>

  <!-- Submitted -->
  <rect x="275" y="80" width="130" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="106" text-anchor="middle" font-weight="600" fill="#1d4ed8">Submitted</text>

  <!-- Arrow: Submitted → Manager Approved -->
  <line x1="340" y1="124" x2="340" y2="230" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="350" y="175" font-size="10" fill="#16a34a">approve</text>

  <!-- Manager Approved -->
  <rect x="275" y="235" width="130" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="340" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Manager</text>
  <text x="340" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Approved</text>

  <!-- Arrow: Submitted → Manager Rejected -->
  <line x1="405" y1="124" x2="560" y2="230" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="510" y="170" font-size="10" fill="#dc2626">reject</text>

  <!-- Manager Rejected -->
  <rect x="500" y="235" width="130" height="44" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="565" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="#b91c1c">Manager</text>
  <text x="565" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#b91c1c">Rejected</text>

  <!-- Arrow: Manager Approved → Finance Approved -->
  <line x1="340" y1="279" x2="340" y2="395" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="350" y="340" font-size="10" fill="#16a34a">approve</text>

  <!-- Finance Approved -->
  <rect x="275" y="400" width="130" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="340" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Finance</text>
  <text x="340" y="433" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Approved</text>

  <!-- Arrow: Manager Approved → Finance Rejected -->
  <line x1="405" y1="279" x2="560" y2="395" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="510" y="340" font-size="10" fill="#dc2626">reject</text>

  <!-- Finance Rejected -->
  <rect x="500" y="400" width="130" height="44" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="565" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#b91c1c">Finance</text>
  <text x="565" y="433" text-anchor="middle" font-size="12" font-weight="600" fill="#b91c1c">Rejected</text>

  <!-- Arrow: Finance Approved → PO Issued -->
  <line x1="405" y1="422" x2="650" y2="490" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="530" y="465" font-size="10" fill="#16a34a">issue PO</text>

  <!-- PO Issued (terminal) -->
  <rect x="655" y="470" width="130" height="44" rx="22" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="720" y="488" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Purchase Order</text>
  <text x="720" y="503" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Issued</text>

  <!-- Revise arrows back to Draft -->
  <!-- Manager Rejected → Draft -->
  <path d="M 500 257 C 450 257, 200 200, 170 124" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="310" y="215" font-size="10" fill="#2563eb">revise</text>

  <!-- Finance Rejected → Draft -->
  <path d="M 500 422 C 400 422, 120 300, 120 124" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="170" y="310" font-size="10" fill="#2563eb">revise</text>
</svg>
